<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>仓库盘点</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei","PingFang SC",sans-serif;font-size:16px;background:#f0f2f5;color:#1f2937;min-height:100vh;display:flex;flex-direction:column}
.header{background:#1a1a2e;color:#fff;padding:14px 20px;display:flex;align-items:center;box-shadow:0 4px 6px rgba(0,0,0,.07);position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:700}
.search-area{background:linear-gradient(135deg,#1e3a5f,#1a1a2e);padding:14px 16px;text-align:center}
.search-input{width:100%;height:52px;font-size:20px;font-weight:600;text-align:center;border:3px solid transparent;border-radius:14px;background:#fff;color:#111827;outline:none}
.search-input:focus{border-color:#1677ff}
.search-input::placeholder{color:#cbd5e1;font-size:15px;font-weight:400}
.search-hint{color:rgba(255,255,255,.5);font-size:13px;margin-top:8px}
.progress-bar{display:flex;align-items:center;justify-content:center;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:52px;z-index:99}
.progress-item{text-align:center;padding:4px 12px}
.progress-num{display:block;font-size:22px;font-weight:800}
.progress-label{font-size:11px;color:#9ca3af;font-weight:500}
.progress-divider{width:1px;height:32px;background:#e5e7eb}
.progress-item.green .progress-num{color:#16a34a}
.progress-item.orange .progress-num{color:#ea580c}
.results-container{flex:1;padding:12px;overflow-y:auto}
.result-count{font-size:14px;color:#6b7280;margin-bottom:8px;padding:0 4px}
.result-count.hidden{display:none}
.item-cards{display:flex;flex-direction:column;gap:10px}
.item-card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;border-left:4px solid #e5e7eb}
.item-card.card-pending{border-left-color:#1677ff}
.item-card.card-normal{border-left-color:#16a34a}
.item-card.card-diff{border-left-color:#ea580c}
.card-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.card-header:active{background:#f9fafb}
.card-info{flex:1;min-width:0}
.card-code{font-size:15px;font-weight:700;font-family:Consolas,"Courier New",monospace;word-break:break-all}
.card-name{font-size:14px;color:#6b7280;margin-top:2px}
.card-meta{font-size:12px;color:#9ca3af;margin-top:2px}
.card-badge{font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-left:8px}
.badge-pending{background:#dbeafe;color:#1e40af}
.badge-normal{background:#dcfce7;color:#166534}
.badge-diff{background:#fff7ed;color:#9a3412}
.card-expand-icon{font-size:14px;color:#9ca3af;margin-left:8px;transition:transform .2s;flex-shrink:0}
.card-expand-icon.open{transform:rotate(180deg)}
.card-body{display:none;padding:0 14px 14px;border-top:1px solid #f3f4f6}
.card-body.open{display:block}
.card-field{display:flex;justify-content:space-between;padding:4px 0;font-size:14px}
.card-field-label{color:#9ca3af;flex-shrink:0}
.card-field-value{font-weight:600}
.card-input-row{display:flex;gap:10px;margin-top:8px}
.card-input-group{flex:1}
.card-input-label{display:block;font-size:13px;font-weight:600;color:#6b7280;margin-bottom:4px}
.card-input{width:100%;height:44px;font-size:20px;font-weight:700;text-align:center;border:2px solid #e5e7eb;border-radius:10px;background:#fafbfc;outline:none;-webkit-appearance:none}
.card-input:focus{border-color:#1677ff;background:#fff}
.btn-submit{width:100%;height:46px;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;background:#1677ff;color:#fff}
.empty-state{text-align:center;padding:80px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty-state.hidden{display:none}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty-title{font-size:20px;font-weight:700;margin-bottom:8px}
.empty-desc{font-size:15px;color:#6b7280}
.spinner{display:inline-block;width:44px;height:44px;border:4px solid #e5e7eb;border-top-color:#1677ff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{text-align:center;padding:80px 20px;font-size:18px;color:#6b7280}
.loading-state.hidden{display:none}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:14px 32px;border-radius:30px;font-size:17px;font-weight:700;color:#fff;z-index:300;transition:opacity .3s}
.toast.hidden{opacity:0;pointer-events:none}
.toast.success{background:#16a34a}
.toast.error{background:#dc2626}
.toast.info{background:#1677ff}
</style>
</head>
<body>
<header class="header"><h1>📋 仓库盘点</h1></header>
<div class="search-area">
<input type="text" id="searchInput" class="search-input" placeholder="🔍 输入料号 / 条码 / 名称搜索..." autofocus autocomplete="off" inputmode="search">
<div class="search-hint">输入后自动搜索 · 点击结果卡片展开录入</div>
</div>
<div class="progress-bar">
<div class="progress-item"><span class="progress-num" id="statCounted">-</span><span class="progress-label">已盘</span></div>
<div class="progress-divider"></div>
<div class="progress-item"><span class="progress-num" id="statPending">-</span><span class="progress-label">待盘</span></div>
<div class="progress-divider"></div>
<div class="progress-item"><span class="progress-num" id="statTotal">-</span><span class="progress-label">总计</span></div>
<div class="progress-divider"></div>
<div class="progress-item green"><span class="progress-num" id="statNormal">-</span><span class="progress-label">正常</span></div>
<div class="progress-divider"></div>
<div class="progress-item orange"><span class="progress-num" id="statDiff">-</span><span class="progress-label">差异</span></div>
</div>
<div id="resultsContainer" class="results-container">
<div id="resultCount" class="result-count hidden"></div>
<div id="itemCards" class="item-cards"></div>
</div>
<div id="emptyState" class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">输入料号或名称开始盘点</div><div class="empty-desc">支持物料编码、商品条码、商品名称搜索</div></div>
<div id="loadingState" class="loading-state hidden"><div class="spinner"></div><div>搜索中...</div></div>
<div id="toast" class="toast hidden"></div>

<script>
// ===== API =====
var API_BASE = 'https://portal-inventory-sys-dqnbytafbf.cn-hangzhou.fcapp.run';

function apiRequest(path, opts) {
  opts = opts || {};
  return fetch(API_BASE + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: opts.body || undefined
  }).then(function(r) {
    return r.json().then(function(b) {
      if (!r.ok || !b.ok) {
        var e = b.error || {};
        throw new Error(e.message || '请求失败 (' + r.status + ')');
      }
      return b;
    });
  });
}

function searchItems(q) {
  return apiRequest('/api/count/search?q=' + encodeURIComponent(q));
}
function submitCount(rid, prep, stor, stock) {
  return apiRequest('/api/count/submit', {
    method: 'POST',
    body: JSON.stringify({ recordId: rid, prepArea: prep, storageArea: stor, stockQty: stock })
  });
}
function getProgress() {
  return apiRequest('/api/count/progress');
}

// ===== App =====
(function() {
  var items = [];
  var dt = null;
  var $si = document.getElementById('searchInput');
  var $ic = document.getElementById('itemCards');
  var $rc = document.getElementById('resultCount');
  var $es = document.getElementById('emptyState');
  var $ls = document.getElementById('loadingState');
  var $to = document.getElementById('toast');

  function toast(msg, type) {
    $to.textContent = msg;
    $to.className = 'toast ' + (type || 'info');
    setTimeout(function() { $to.classList.add('hidden'); }, 2500);
  }

  // Progress
  function loadProgress() {
    getProgress().then(function(r) {
      var p = r.data;
      document.getElementById('statCounted').textContent = p.counted;
      document.getElementById('statPending').textContent = p.pending;
      document.getElementById('statTotal').textContent = p.total;
      document.getElementById('statNormal').textContent = p.normalCount;
      document.getElementById('statDiff').textContent = p.diffCount;
    }).catch(function() {});
  }

  // Search
  function doSearch(q) {
    $ls.classList.remove('hidden');
    $es.classList.add('hidden');
    $ic.innerHTML = '';
    $rc.classList.add('hidden');
    document.getElementById('resultsContainer').style.display = 'none';

    searchItems(q).then(function(r) {
      $ls.classList.add('hidden');
      items = r.data.items || [];
      if (items.length === 0) {
        $es.classList.remove('hidden');
        return;
      }
      document.getElementById('resultsContainer').style.display = 'block';
      $rc.textContent = '找到 ' + items.length + ' 条记录';
      $rc.classList.remove('hidden');
      render();
      if (items.length === 1) toggleCard(items[0].recordId);
    }).catch(function(e) {
      $ls.classList.add('hidden');
      toast(e.message, 'error');
    });
  }

  function onInput() {
    var q = $si.value.trim();
    if (dt) clearTimeout(dt);
    if (!q) {
      items = [];
      $ic.innerHTML = '';
      $rc.classList.add('hidden');
      $es.classList.remove('hidden');
      document.getElementById('resultsContainer').style.display = 'none';
      return;
    }
    dt = setTimeout(function() { doSearch(q); }, 300);
  }

  // Render
  function render() {
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += buildCard(items[i]);
    }
    $ic.innerHTML = html;
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cardState(it) {
    var s = it['盘点状态'] || '';
    if (s.indexOf('差异') >= 0) return 'diff';
    if (s.indexOf('正常') >= 0) return 'normal';
    return 'pending';
  }

  function buildCard(it) {
    var st = cardState(it);
    var mc = it['物料编码'] || '';
    var pn = it['商品名称'] || '';
    var bc = it['商品条码'] || '';
    var sq = it['在库库存'] || '0';
    var pa = it['备货区'] || '';
    var sa = it['库存区'] || '';
    var wh = it['仓库'] || '';
    var cat = it['分类'] || '';

    var done = st !== 'pending';
    var bCl = st === 'normal' ? 'badge-normal' : (st === 'diff' ? 'badge-diff' : 'badge-pending');
    var bTx = st === 'normal' ? '✓ 盘点正常' : (st === 'diff' ? '⚠ 盘点差异' : '待盘点');
    var cCl = st === 'normal' ? 'card-normal' : (st === 'diff' ? 'card-diff' : 'card-pending');
    var diff = (Number(sq) || 0) - (Number(pa) || 0) - (Number(sa) || 0);
    var dT = done ? '差异: ' + (diff >= 0 ? '+' : '') + diff : '';

    var h = '';
    h += '<div class="item-card ' + cCl + '" data-rid="' + esc(it.recordId) + '">';
    h += '<div class="card-header" onclick="CountApp.toggleCard(\'' + esc(it.recordId) + '\')">';
    h += '<div class="card-info">';
    h += '<div class="card-code">' + esc(mc) + '</div>';
    h += '<div class="card-name">' + esc(pn) + '</div>';
    h += '<div class="card-meta">' + (bc ? esc(bc) + ' · ' : '') + '在库: ' + esc(sq) + (wh ? ' · ' + esc(wh) : '') + (dT ? ' · ' + esc(dT) : '') + '</div>';
    h += '</div>';
    h += '<span class="card-badge ' + bCl + '">' + bTx + '</span>';
    h += '<span class="card-expand-icon" id="ei_' + esc(it.recordId) + '">▼</span>';
    h += '</div>';
    h += '<div class="card-body" id="cb_' + esc(it.recordId) + '">';
    h += '<div class="card-field"><span class="card-field-label">物料编码</span><span class="card-field-value">' + esc(mc) + '</span></div>';
    h += '<div class="card-field"><span class="card-field-label">商品名称</span><span class="card-field-value">' + esc(pn) + '</span></div>';
    if (bc) h += '<div class="card-field"><span class="card-field-label">商品条码</span><span class="card-field-value">' + esc(bc) + '</span></div>';
    h += '<div class="card-field"><span class="card-field-label">在库库存</span><span class="card-field-value" style="font-size:18px;color:#1677ff">' + esc(sq) + '</span></div>';
    h += '<div class="card-input-row">';
    h += '<div class="card-input-group"><label class="card-input-label">📦 备货区数量</label><input type="number" class="card-input" id="ip_' + esc(it.recordId) + '" placeholder="0" value="' + esc(pa) + '" inputmode="numeric"></div>';
    h += '<div class="card-input-group"><label class="card-input-label">🏗️ 库存区数量</label><input type="number" class="card-input" id="is_' + esc(it.recordId) + '" placeholder="0" value="' + esc(sa) + '" inputmode="numeric"></div>';
    h += '</div>';
    h += '<div class="card-submit-row"><button class="btn-submit" id="bs_' + esc(it.recordId) + '" onclick="CountApp.submitItem(\'' + esc(it.recordId) + '\',\'' + esc(sq) + '\')">✅ 提交盘点</button></div>';
    h += '</div></div>';
    return h;
  }

  // Toggle
  function toggleCard(rid) {
    var b = document.getElementById('cb_' + rid);
    var i = document.getElementById('ei_' + rid);
    if (!b || !i) return;
    var wasOpen = b.classList.contains('open');
    var allBodies = document.querySelectorAll('.card-body.open');
    for (var x = 0; x < allBodies.length; x++) allBodies[x].classList.remove('open');
    var allIcons = document.querySelectorAll('.card-expand-icon.open');
    for (var y = 0; y < allIcons.length; y++) allIcons[y].classList.remove('open');
    if (!wasOpen) {
      b.classList.add('open');
      i.classList.add('open');
      setTimeout(function() {
        var inp = document.getElementById('ip_' + rid);
        if (inp) inp.focus();
      }, 100);
    }
  }

  // Submit
  function submitItem(rid, sq) {
    var ip = document.getElementById('ip_' + rid);
    var is = document.getElementById('is_' + rid);
    var bs = document.getElementById('bs_' + rid);
    var card = document.querySelector('.item-card[data-rid="' + esc(rid) + '"]');
    if (!ip || !is || !bs) return;
    var pa = ip.value.trim();
    var sa = is.value.trim();
    if (pa === '' && sa === '') { toast('请至少输入备货区或库存区数量', 'error'); return; }
    var pn = Number(pa) || 0, sn = Number(sa) || 0, sqn = Number(sq) || 0;
    var diff = sqn - pn - sn;
    var msg = '确认提交盘点？\n备货区: ' + pn + ' · 库存区: ' + sn + '\n合计: ' + (pn + sn);
    if (diff !== 0) msg += '\n⚠ 与在库库存(' + sqn + ')差异: ' + (diff >= 0 ? '+' : '') + diff;
    if (!confirm(msg)) return;

    bs.disabled = true; bs.textContent = '提交中...';
    ip.disabled = true; is.disabled = true;

    submitCount(rid, pa, sa, sq).then(function(r) {
      bs.disabled = false; bs.textContent = '✅ 提交盘点';
      ip.disabled = false; is.disabled = false;
      if (card) {
        card.classList.remove('card-pending');
        card.classList.add(r.data.diff === 0 ? 'card-normal' : 'card-diff');
      }
      var badge = card ? card.querySelector('.card-badge') : null;
      if (badge) {
        badge.className = 'card-badge ' + (r.data.diff === 0 ? 'badge-normal' : 'badge-diff');
        badge.textContent = r.data.diff === 0 ? '✓ 盘点正常' : '⚠ 盘点差异';
      }
      for (var i = 0; i < items.length; i++) {
        if (items[i].recordId === rid) {
          items[i]['备货区'] = String(pn);
          items[i]['库存区'] = String(sn);
          items[i]['盘点状态'] = r.data.status;
        }
      }
      loadProgress();
      toast(r.data.diff === 0 ? '✅ 盘点正常，已提交' : '⚠ 盘点差异 ' + r.data.diff + '，已提交', r.data.diff === 0 ? 'success' : 'info');
    }).catch(function(e) {
      bs.disabled = false; bs.textContent = '✅ 提交盘点';
      ip.disabled = false; is.disabled = false;
      toast('提交失败: ' + e.message, 'error');
    });
  }

  // Init
  $si.addEventListener('input', onInput);
  $si.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (dt) clearTimeout(dt);
      var q = $si.value.trim();
      if (q) doSearch(q);
    }
  });
  loadProgress();

  // Expose to global
  window.CountApp = { toggleCard: toggleCard, submitItem: submitItem };
})();
</script>
</body>
</html>
